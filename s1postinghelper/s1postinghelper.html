132	Serangoon Garden	-	22	25	30	Serangoon

135	Whitley	-	22	25	30	Bishan
136	Woodlands Ring	-	22	25	29	Woodlands

139	Yuying	-	22	25	29	Hougang`;

    const parseCell = (cell) => {
      if (cell === "-" || cell === "") return { value: null, sap: false };
      const sap = cell.endsWith("M");
      const num = parseInt(sap ? cell.slice(0, -1) : cell, 10);
      return { value: isNaN(num) ? null : num, sap };
    };

    const SCHOOLS = RAW.trim().split("\n").map((line) => {
      const parts = line.split("\t");
      const [no, name, ipRaw, pg3Raw, pg2Raw, pg1Raw, zone] = parts;
      const ip = parseCell(ipRaw);
      const pg3 = parseCell(pg3Raw);
      const pg2 = parseCell(pg2Raw);
      const pg1 = parseCell(pg1Raw);
      return {
        no: parseInt(no, 10),
        name,
        zone,
        tracks: { IP: ip, PG3: pg3, PG2: pg2, PG1: pg1 },
        isSAP: ip.sap || pg3.sap || pg2.sap || pg1.sap,
      };
    });

    const AREAS = ["Ang Mo Kio", "Bedok", "Bishan", "Bukit Batok", "Bukit Merah", "Bukit Panjang", "Bukit Timah", "Central", "Choa Chu Kang", "Clementi", "Geylang", "Hougang", "Jurong East", "Jurong West", "Kallang", "Marine Parade", "Novena", "Pasir Ris", "Punggol", "Queenstown", "Sembawang", "Sengkang", "Serangoon", "Tampines", "Toa Payoh", "Woodlands", "Yishun"];

    // Group areas into broader regions for the filter UI
    const REGIONS = {
      "North": ["Sembawang", "Woodlands", "Yishun"],
      "North-East": ["Ang Mo Kio", "Hougang", "Punggol", "Sengkang", "Serangoon"],
      "East": ["Bedok", "Geylang", "Marine Parade", "Pasir Ris", "Tampines"],
      "West": ["Bukit Batok", "Bukit Panjang", "Choa Chu Kang", "Clementi", "Jurong East", "Jurong West"],
      "Central": ["Bishan", "Bukit Merah", "Bukit Timah", "Central", "Kallang", "Novena", "Queenstown", "Toa Payoh"],
    };
    const TRACKS = ["IP", "PG3", "PG2", "PG1"];
    const HCL_RANK = { None: 0, Pass: 1, Merit: 2, Distinction: 3 };

    // ─────────────────────────────────────────────────────────────────────────────
    // Component
    // ─────────────────────────────────────────────────────────────────────────────
    function PSLEShortlister() {
      const [score, setScore] = useState(15);
      const [scoreInput, setScoreInput] = useState("15");
      const [hcl, setHcl] = useState("None");
      const [zones, setZones] = useState(new Set(AREAS));
      const [tracks, setTracks] = useState(new Set(["PG3", "PG2"]));
      const [safetyOnly, setSafetyOnly] = useState(false);
      const [sapOnly, setSapOnly] = useState(false);
      const [sortBy, setSortBy] = useState("buffer"); // buffer | name | cutoff
      const [picks, setPicks] = useState([]); // array of school.no in priority order

      const toggle = (set, val, setter) => {
        const next = new Set(set);
        if (next.has(val)) next.delete(val); else next.add(val);
        setter(next);
      };

      const results = useMemo(() => {
        const out = [];
        const hclMeetsSAP = HCL_RANK[hcl] >= HCL_RANK.Merit;

        for (const s of SCHOOLS) {
          if (!zones.has(s.zone)) continue;
          if (sapOnly && !s.isSAP) continue;

          // Find best matching track among user's selected tracks
          // Allow buffer down to -2 (score up to 2 points above cut-off) so user can see near-misses
          let best = null;
          for (const t of TRACKS) {
            if (!tracks.has(t)) continue;
            const cell = s.tracks[t];
            if (cell.value == null) continue;
            const buffer = cell.value - score;
            if (buffer < -2) continue; // exclude only if more than 2 pts above cut-off
            if (!best || buffer > best.buffer) {
              best = { track: t, cutoff: cell.value, sap: cell.sap, buffer };
            }
          }
          if (!best) continue;

          // HCL rule for SAP tracks: if track requires Merit and student lacks it,
          // the school is risky regardless of score buffer. If score == cutoff AND
          // HCL fails, demote effective safety so safety-buffer filter excludes it.
          const hclWarning = best.sap && !hclMeetsSAP;
          const hclRisky = hclWarning; // tied score with weak HCL = not safe

          if (safetyOnly && (best.buffer < 2 || hclRisky)) continue;

          out.push({ ...s, match: best, hclWarning, hclRisky });
        }

        out.sort((a, b) => {
          if (sortBy === "name") return a.name.localeCompare(b.name);
          if (sortBy === "cutoff") return a.match.cutoff - b.match.cutoff;
          return b.match.buffer - a.match.buffer; // safest first
        });
        return out;
      }, [score, hcl, zones, tracks, safetyOnly, sapOnly, sortBy]);

      const pickedSchools = picks
        .map((no) => SCHOOLS.find((s) => s.no === no))
        .filter(Boolean);

      // Re-evaluate match info for picked schools using current filters
      const pickedWithMatch = pickedSchools.map((s) => {
        const hclMeetsSAP = HCL_RANK[hcl] >= HCL_RANK.Merit;
        let best = null;
        for (const t of TRACKS) {
          if (!tracks.has(t)) continue;
          const cell = s.tracks[t];
          if (cell.value == null) continue;
          const buffer = cell.value - score;
          if (buffer < -2) continue;
          if (!best || buffer > best.buffer) {
            best = { track: t, cutoff: cell.value, sap: cell.sap, buffer };
          }
        }
        const hclRisky = best && best.sap && !hclMeetsSAP;
        return { ...s, match: best, hclRisky };
      });

      const addPick = (no) => {
        if (picks.includes(no)) return;
        if (picks.length >= 6) return;
        setPicks([...picks, no]);
      };
      const removePick = (no) => setPicks(picks.filter((x) => x !== no));
      const movePick = (no, dir) => {
        const idx = picks.indexOf(no);
        if (idx < 0) return;
        const swap = idx + dir;
        if (swap < 0 || swap >= picks.length) return;
        const next = [...picks];
        [next[idx], next[swap]] = [next[swap], next[idx]];
        setPicks(next);
      };

      const exportText = pickedWithMatch
        .map((s, i) => `${i + 1}. ${s.name} — ${s.zone}${s.match ? ` (${s.match.track}, cut-off ${s.match.cutoff}${s.match.sap ? "M" : ""})` : ""}${s.hclRisky ? " [HCL risky]" : ""}`)
        .join("\n");

      const copyExport = async () => {
        try { await navigator.clipboard.writeText(exportText); } catch (e) {}
      };

      // Strategy summary
      const strategy = useMemo(() => {
        const overshoot = pickedWithMatch.filter((s) => s.match && s.match.buffer < 0).length;
        const reach = pickedWithMatch.filter((s) => s.match && s.match.buffer >= 0 && (s.match.buffer < 2 || s.hclRisky)).length;
        const safe = pickedWithMatch.filter((s) => s.match && s.match.buffer >= 2 && !s.hclRisky).length;
        const zoneSet = new Set(pickedWithMatch.map((s) => s.zone));
        return { overshoot, reach, safe, zones: [...zoneSet] };
      }, [pickedWithMatch]);

      const bufferTone = (buffer, hclRisky) => {
        if (buffer < 0) return "tight";        // red — over cut-off
        if (hclRisky) return "tight";          // red — SAP HCL gap
        if (buffer >= 2) return "comfort";     // green — safe
        return "borderline";                    // orange — +0 or +1
      };

      return (
        <div className="min-h-screen bg-stone-50 text-stone-900" style={{ fontFamily: "'Lora', Georgia, serif" }}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Lora:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap');
            .display { font-family: 'Fraunces', Georgia, serif; font-feature-settings: "ss01"; }
            .mono { font-family: 'JetBrains Mono', monospace; }
            .grid-bg {
              background-image: linear-gradient(to right, rgba(0,0,0,0.04) 1px, transparent 1px),
                                linear-gradient(to bottom, rgba(0,0,0,0.04) 1px, transparent 1px);
              background-size: 32px 32px;
            }
            .chip {
              transition: all 150ms ease;
              border: 1px solid #d6d3d1;
            }
            .chip:hover { border-color: #292524; }
            .chip.on {
              background: #1c1917;
              color: #fafaf9;
              border-color: #1c1917;
            }
            .row { transition: background 120ms ease; }
            .row:hover { background: #fafaf9; }
            .pill {
              font-family: 'JetBrains Mono', monospace;
              font-size: 10px;
              letter-spacing: 0.05em;
              padding: 2px 7px;
              border-radius: 999px;
              text-transform: uppercase;
            }
            .tone-safe { background: #064e3b; color: #ecfdf5; }
            .tone-comfort { background: #15803d; color: #f0fdf4; }
            .tone-borderline { background: #c2410c; color: #fff7ed; }
            .tone-tight { background: #991b1b; color: #fef2f2; }
            .tone-sap { background: #1e1b4b; color: #eef2ff; }
            .tone-warn { background: #fbbf24; color: #422006; }
            .num-input::-webkit-inner-spin-button { opacity: 1; }
          `}</style>

          {/* HEADER */}
          <header className="border-b border-stone-300 bg-stone-100 grid-bg">
            <div className="max-w-6xl mx-auto px-6 py-10">
              <div className="flex items-baseline justify-between gap-4 flex-wrap">
                <div>
                  <div className="mono text-xs tracking-widest text-stone-500 uppercase mb-2">
                    PSLE · Secondary School Posting Helper
                  </div>
                  <h1 className="display text-5xl md:text-6xl font-black leading-none tracking-tight">
                    Six Choices.<br/>
                    <span className="italic font-medium text-stone-500">Made carefully.</span>
                  </h1>
                </div>
                <div className="mono text-xs text-stone-500 max-w-xs leading-relaxed">
                  A shortlisting tool for Primary 6 students and parents.
                  Filters {SCHOOLS.length} secondary schools by score, track, and area using last year's cut-offs.
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-6 py-10 space-y-10">

            {/* INPUT PANEL */}
            <section>
              <SectionHeader num="01" title="Your details" />
              <div className="grid md:grid-cols-12 gap-6 mt-6">

                {/* Score */}
                <div className="md:col-span-4 bg-white border border-stone-200 p-5">
                  <div className="mono text-[10px] tracking-widest text-stone-500 uppercase mb-3">PSLE AL Score</div>
                  <input
                    type="text"
                    inputMode="numeric"
                    pattern="[0-9]*"
                    value={scoreInput}
                    onChange={(e) => {
                      const v = e.target.value.replace(/[^0-9]/g, "");
                      setScoreInput(v);
                      if (v !== "") {
                        const n = parseInt(v, 10);
                        if (n >= 4 && n <= 30) setScore(n);
                      }
                    }}
                    onBlur={() => {
                      if (score < 4) { setScore(4); setScoreInput("4"); }
                      if (score > 30) { setScore(30); setScoreInput("30"); }
                      if (scoreInput === "") setScoreInput(score.toString());
                    }}
                    className="w-full text-4xl display font-black bg-transparent border-b-2 border-stone-300 focus:border-stone-900 outline-none py-2 num-input"
                  />
                  <div className="mono text-[10px] text-stone-500 mt-3">Range: 4 – 30</div>
                </div>

                {/* HCL */}
                <div className="md:col-span-4 bg-white border border-stone-200 p-5">
                  <div className="mono text-[10px] tracking-widest text-stone-500 uppercase mb-3">Higher Chinese Level</div>
                  <div className="flex flex-wrap gap-2">
                    {["None", "Pass", "Merit", "Distinction"].map((opt) => (
                      <button
                        key={opt}
                        onClick={() => setHcl(opt)}
                        className={`chip on px-3 py-1.5 rounded-md text-xs font-medium ${hcl === opt ? "on" : ""}`}
                      >
                        {opt}
                      </button>
                    ))}
                  </div>
                  <div className="mono text-[10px] text-stone-500 mt-3">Required for SAP schools at posting</div>
                </div>

                {/* Toggle switches */}
                <div className="md:col-span-4 bg-white border border-stone-200 p-5">
                  <div className="mono text-[10px] tracking-widest text-stone-500 uppercase mb-3">Filters</div>
                  <div className="space-y-3">
                    <label className="flex items-center gap-3 cursor-pointer">
                      <input
                        type="checkbox"
                        checked={safetyOnly}
                        onChange={(e) => setSafetyOnly(e.target.checked)}
                        className="w-4 h-4 accent-stone-900"
                      />
                      <span className="text-sm">Show only safe choices (+2 or more)</span>
                    </label>
                    <label className="flex items-center gap-3 cursor-pointer">
                      <input
                        type="checkbox"
                        checked={sapOnly}
                        onChange={(e) => setSapOnly(e.target.checked)}
                        className="w-4 h-4 accent-stone-900"
                      />
                      <span className="text-sm">SAP schools only</span>
                    </label>
                  </div>
                </div>
              </div>

              {/* Tracks */}
              <div className="mt-6 bg-white border border-stone-200 p-5">
                <div className="mono text-[10px] tracking-widest text-stone-500 uppercase mb-3">Posting tracks</div>
                <div className="flex flex-wrap gap-2">
                  {TRACKS.map((t) => (
                    <button
                      key={t}
                      onClick={() => toggle(tracks, t, setTracks)}
                      className={`chip px-3 py-1.5 rounded-md text-xs font-medium ${tracks.has(t) ? "on" : ""}`}
                    >
                      {t}
                    </button>
                  ))}
                </div>
              </div>

              {/* Zones */}
              <div className="mt-6 bg-white border border-stone-200 p-5">
                <div className="flex items-center justify-between mb-3">
                  <div className="mono text-[10px] tracking-widest text-stone-500 uppercase">Areas</div>
                  <div className="flex gap-2">
                    <button onClick={() => setZones(new Set(AREAS))} className="mono text-[10px] underline text-stone-500">All</button>
                    <button onClick={() => setZones(new Set())} className="mono text-[10px] underline text-stone-500">None</button>
                  </div>
                </div>
                {Object.entries(REGIONS).map(([region, areas]) => (
                  <div key={region} className="mb-4 last:mb-0">
                    <div className="mono text-[10px] text-stone-500 mb-2">{region}</div>
                    <div className="flex flex-wrap gap-2">
                      {areas.map((area) => (
                        <button
                          key={area}
                          onClick={() => toggle(zones, area, setZones)}
                          className={`chip px-2.5 py-1 rounded-md text-[11px] ${zones.has(area) ? "on" : ""}`}
                        >
                          {area}
                        </button>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </section>

            {/* RESULTS */}
            <section>
              <SectionHeader num="02" title={`Matches (${results.length})`} />
              <div className="mt-6 bg-white border border-stone-200 overflow-hidden">
                <div className="overflow-x-auto">
                  <table className="w-full text-sm">
                    <thead className="bg-stone-100 border-b border-stone-200">
                      <tr>
                        <th className="text-left px-4 py-3 mono text-[10px] tracking-widest text-stone-500 uppercase w-12">#</th>
                        <th className="text-left px-4 py-3 mono text-[10px] tracking-widest text-stone-500 uppercase">School</th>
                        <th className="text-left px-4 py-3 mono text-[10px] tracking-widest text-stone-500 uppercase w-32">Area</th>
                        <th className="text-left px-4 py-3 mono text-[10px] tracking-widest text-stone-500 uppercase w-24">Track</th>
                        <th className="text-left px-4 py-3 mono text-[10px] tracking-widest text-stone-500 uppercase w-20">Cut-off</th>
                        <th className="text-left px-4 py-3 mono text-[10px] tracking-widest text-stone-500 uppercase w-24">Buffer</th>
                        <th className="text-right px-4 py-3 mono text-[10px] tracking-widest text-stone-500 uppercase w-24">Action</th>
                      </tr>
                    </thead>
                    <tbody>
                      {results.length === 0 && (
                        <tr>
                          <td colSpan={7} className="px-4 py-10 text-center text-stone-500 italic">
                            No matches found. Try adjusting your filters.
                          </td>
                        </tr>
                      )}
                      {results.map((s, idx) => (
                        <SchoolRow
                          key={s.no}
                          school={s}
                          idx={idx}
                          isPicked={picks.includes(s.no)}
                          onAdd={() => addPick(s.no)}
                          tone={bufferTone(s.match.buffer, s.hclRisky)}
                        />
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </section>

            {/* PICKS */}
            <section>
              <SectionHeader num="03" title="Your 6 choices" />
              {pickedWithMatch.length === 0 ? (
                <div className="mt-6 bg-white border border-stone-200 p-8 text-center text-stone-500 italic">
                  No schools selected yet. Click "+ Add" on any school above.
                </div>
              ) : (
                <>
                  <div className="mt-6 bg-white border border-stone-200 overflow-hidden">
                    <div className="overflow-x-auto">
                      <table className="w-full text-sm">
                        <thead className="bg-stone-100 border-b border-stone-200">
                          <tr>
                            <th className="text-left px-4 py-3 mono text-[10px] tracking-widest text-stone-500 uppercase w-12">Pri</th>
                            <th className="text-left px-4 py-3 mono text-[10px] tracking-widest text-stone-500 uppercase">School</th>
                            <th className="text-left px-4 py-3 mono text-[10px] tracking-widest text-stone-500 uppercase w-32">Area</th>
                            <th className="text-left px-4 py-3 mono text-[10px] tracking-widest text-stone-500 uppercase w-24">Track</th>
                            <th className="text-left px-4 py-3 mono text-[10px] tracking-widest text-stone-500 uppercase w-20">Cut-off</th>
                            <th className="text-left px-4 py-3 mono text-[10px] tracking-widest text-stone-500 uppercase w-24">Buffer</th>
                            <th className="text-right px-4 py-3 mono text-[10px] tracking-widest text-stone-500 uppercase w-40">Actions</th>
                          </tr>
                        </thead>
                        <tbody>
                          {pickedWithMatch.map((s, idx) => (
                            <PickedRow
                              key={s.no}
                              school={s}
                              idx={idx}
                              total={pickedWithMatch.length}
                              onRemove={() => removePick(s.no)}
                              onMoveUp={() => movePick(s.no, -1)}
                              onMoveDown={() => movePick(s.no, 1)}
                              tone={bufferTone(s.match?.buffer ?? -99, s.hclRisky)}
                            />
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>

                  {/* Strategy summary */}
                  <div className="mt-6 grid md:grid-cols-2 gap-6">
                    <div className="bg-stone-900 text-stone-50 p-6">
                      <div className="mono text-[10px] tracking-widest text-stone-400 uppercase mb-4">Strategy summary</div>
                      <div className="space-y-4">
                        <StratRow label="Overshoot" value={strategy.overshoot} hint="Below cut-off" />
                        <StratRow label="Reach" value={strategy.reach} hint="0 to +1 buffer" />
                        <StratRow label="Safe" value={strategy.safe} hint="+2 or more" />
                      </div>
                    </div>
                    <div className="bg-white border border-stone-200 p-6">
                      <div className="mono text-[10px] tracking-widest text-stone-500 uppercase mb-3">Export</div>
                      <p className="text-sm text-stone-600 mb-4">
                        Your ordered list with track and cut-off info:
                      </p>
                      <pre className="mono text-xs bg-stone-100 p-3 rounded-md overflow-auto max-h-40 whitespace-pre-wrap">
                        {exportText}
                      </pre>
                      <button onClick={copyExport} className="mt-3 chip px-3 py-1.5 rounded-md text-xs font-medium">
                        Copy to clipboard
                      </button>
                    </div>
                  </div>
                </>
              )}
            </section>
          </main>

          <footer className="mt-16 border-t border-stone-300 bg-stone-100">
            <div className="max-w-6xl mx-auto px-6 py-8">
              <div className="mono text-[10px] text-stone-500">
                Data source: MOE Secondary School Posting Exercise (previous year). Cut-offs are indicative; actual posting depends on aggregate scores, tie-breakers, and vacancy.
                SAP schools require at least Merit in Higher Chinese during posting. This tool is for planning purposes only.
              </div>
            </div>
          </footer>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────────
    // Sub-components
    // ─────────────────────────────────────────────────────────────────────────────
    function SectionHeader({ num, title }) {
      return (
        <div className="flex items-end gap-4">
          <div className="mono text-xs text-stone-500">{num}</div>
          <h2 className="display text-3xl font-bold">{title}</h2>
        </div>
      );
    }

    function SchoolRow({ school, idx, isPicked, onAdd, tone }) {
      const { name, zone, match, hclRisky } = school;
      const toneClass = {
        safe: "tone-safe",
        comfort: "tone-comfort",
        borderline: "tone-borderline",
        tight: "tone-tight",
      }[tone];

      return (
        <tr className="row border-b border-stone-100">
          <td className="px-4 py-3 mono text-xs text-stone-500">{idx + 1}</td>
          <td className="px-4 py-3">
            <div className="font-medium">{name}</div>
            {hclRisky && <div className="pill tone-warn inline-block mt-1">HCL risky</div>}
          </td>
          <td className="px-4 py-3 text-stone-600">{zone}</td>
          <td className="px-4 py-3"><span className="pill bg-stone-200">{match.track}</span></td>
          <td className="px-4 py-3 mono">{match.cutoff}{match.sap ? "M" : ""}</td>
          <td className="px-4 py-3">
            <span className={`pill ${toneClass}`}>
              {match.buffer > 0 ? "+" : ""}{match.buffer}
            </span>
          </td>
          <td className="px-4 py-3 text-right">
            {isPicked ? (
              <span className="mono text-xs text-stone-500">Added</span>
            ) : (
              <button onClick={onAdd} className="chip px-3 py-1 rounded-md text-xs font-medium">+ Add</button>
            )}
          </td>
        </tr>
      );
    }

    function PickedRow({ school, idx, total, onRemove, onMoveUp, onMoveDown, tone }) {
      const { name, zone, match, hclRisky } = school;
      const toneClass = {
        safe: "tone-safe",
        comfort: "tone-comfort",
        borderline: "tone-borderline",
        tight: "tone-tight",
      }[tone];

      return (
        <tr className="row border-b border-stone-100">
          <td className="px-4 py-3 mono text-xs text-stone-500">{idx + 1}</td>
          <td className="px-4 py-3">
            <div className="font-medium">{name}</div>
            {hclRisky && <div className="pill tone-warn inline-block mt-1">HCL risky</div>}
          </td>
          <td className="px-4 py-3 text-stone-600">{zone}</td>
          <td className="px-4 py-3"><span className="pill bg-stone-200">{match?.track ?? "-"}</span></td>
          <td className="px-4 py-3 mono">{match?.cutoff ?? "-"}{match?.sap ? "M" : ""}</td>
          <td className="px-4 py-3">
            {match ? (
              <span className={`pill ${toneClass}`}>
                {match.buffer > 0 ? "+" : ""}{match.buffer}
              </span>
            ) : (
              <span className="pill tone-tight">N/A</span>
            )}
          </td>
          <td className="px-4 py-3 text-right">
            <div className="flex items-center justify-end gap-2">
              <button onClick={onMoveUp} disabled={idx === 0} className="chip px-2 py-1 rounded text-xs disabled:opacity-30">↑</button>
              <button onClick={onMoveDown} disabled={idx === total - 1} className="chip px-2 py-1 rounded text-xs disabled:opacity-30">↓</button>
              <button onClick={onRemove} className="chip px-2 py-1 rounded text-xs">✕</button>
            </div>
          </td>
        </tr>
      );
    }

    function StratRow({ label, value, hint }) {
      return (
        <div className="flex items-baseline justify-between">
          <div>
            <div className="display text-sm">{label}</div>
            <div className="mono text-[10px] text-stone-500">{hint}</div>
          </div>
          <div className="display text-3xl font-black">{value}</div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────────
    // Render
    // ─────────────────────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<PSLEShortlister />);
  </script>
</body>
</html>
