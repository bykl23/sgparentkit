        // Parse school data
        function parseSchoolData(data) {
            const lines = data.trim().split('\n');
            const headers = lines[0].split('\t');
            const schools = [];

            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split('\t');
                if (values.length < headers.length) continue;

                const school = {
                    name: values[0],
                    zone: values[1],
                    tracks: {}
                };

                ['IP', 'PG3', 'PG2', 'PG1'].forEach((track, idx) => {
                    const val = values[idx + 2];
                    if (val && val !== '-') {
                        const isSAP = val.includes('M');
                        const score = parseInt(val.replace('M', ''));
                        school.tracks[track] = { score, isSAP };
                    }
                });

                schools.push(school);
            }

            return schools;
        }

        const schools = parseSchoolData(rawData);

            const [selectedTracks, setSelectedTracks] = useState(['IP', 'PG3', 'PG2', 'PG1']);
            const [selectedAreas, setSelectedAreas] = useState([]);
            const [showBufferOnly, setShowBufferOnly] = useState(false);
            const [showSAPOnly, setShowSAPOnly] = useState(false);
            const [sortBy, setSortBy] = useState('safest');
            const [picks, setPicks] = useState([]);

            const validScore = score === '' || (parseInt(score) >= 4 && parseInt(score) <= 36);

            const toggleTrack = (track) => {
                setSelectedTracks(prev =>
                    prev.includes(track)
                        ? prev.filter(t => t !== track)
                        : [...prev, track]
                );
            };

            const toggleArea = (area) => {
                setSelectedAreas(prev =>
                    prev.includes(area)
                        ? prev.filter(a => a !== area)
                        : [...prev, area]
                );
            };

            const toggleRegion = (region) => {
                const regionAreas = REGIONS[region];
                const allSelected = regionAreas.every(a => selectedAreas.includes(a));

                if (allSelected) {
                    setSelectedAreas(prev => prev.filter(a => !regionAreas.includes(a)));
                } else {
                    setSelectedAreas(prev => [...new Set([...prev, ...regionAreas])]);
                }
            };

            const isRegionActive = (region) => {
                const regionAreas = REGIONS[region];
                return regionAreas.length > 0 && regionAreas.every(a => selectedAreas.includes(a));
            };

            const addPick = (school, track) => {
                if (picks.length >= 6) return;
                if (picks.some(p => p.school.name === school.name && p.track === track)) return;
                setPicks([...picks, { school, track }]);
            };

            const removePick = (index) => {
                setPicks(picks.filter((_, i) => i !== index));
            };

            const movePick = (index, direction) => {
                const newPicks = [...picks];
                const newIndex = index + direction;
                if (newIndex < 0 || newIndex >= newPicks.length) return;
                [newPicks[index], newPicks[newIndex]] = [newPicks[newIndex], newPicks[index]];
                setPicks(newPicks);
            };

            const filteredSchools = useMemo(() => {
                if (!validScore || score === '') return [];

                const numScore = parseInt(score);
                const results = [];

                schools.forEach(school => {
                    if (selectedAreas.length > 0 && !selectedAreas.includes(school.zone)) return;

                    Object.entries(school.tracks).forEach(([track, data]) => {
                        if (!selectedTracks.includes(track)) return;
                        if (showSAPOnly && !data.isSAP) return;

                        const buffer = numScore - data.score;
                        if (showBufferOnly && buffer < 2) return;

                        const meetsHCL = hclLevel === 'distinction' || 
                            (data.isSAP && hclLevel === 'merit') ||
                            !data.isSAP;

                        const isHCLRisky = data.isSAP && hclLevel !== 'distinction' && hclLevel !== 'merit';
                        const isHCLLow = data.isSAP && hclLevel === 'none';

                        results.push({
                            school,
                            track,
                            cutOff: data.score,
                            isSAP: data.isSAP,
                            buffer,
                            isHCLRisky,
                            isHCLLow,
                            meetsHCL
                        });
                    });
                });

                // Sort results
                if (sortBy === 'safest') {
                    results.sort((a, b) => b.buffer - a.buffer);
                } else if (sortBy === 'cutoff') {
                    results.sort((a, b) => a.cutOff - b.cutOff);
                } else if (sortBy === 'name') {
                    results.sort((a, b) => a.school.name.localeCompare(b.school.name));
                }

                return results;
            }, [score, hclLevel, selectedTracks, selectedAreas, showBufferOnly, showSAPOnly, sortBy]);

            const strategyBreakdown = useMemo(() => {
                if (!validScore || score === '') return { overshoot: 0, reach: 0, safe: 0, areas: [] };

                const numScore = parseInt(score);
                let overshoot = 0, reach = 0, safe = 0;
                const areas = new Set();

                picks.forEach(({ school, track }) => {
                    areas.add(school.zone);
                    const trackData = school.tracks[track];
                    if (!trackData) return;

                    const buffer = numScore - trackData.score;
                    if (buffer < 0) overshoot++;
                    else if (buffer <= 1 || trackData.isSAP && hclLevel !== 'distinction') reach++;
                    else safe++;
                });

                return { overshoot, reach, safe, areas: Array.from(areas) };
            }, [picks, score, hclLevel]);

            const exportText = useMemo(() => {
                if (picks.length === 0) return 'No choices selected yet.';
                return picks.map((p, i) => `${i + 1}. ${p.school.name} (${p.track}) - Cut-off: ${p.school.tracks[p.track]?.score || 'N/A'}`).join('\n');
            }, [picks]);

            const copyToClipboard = () => {
                navigator.clipboard.writeText(exportText);
                alert('Copied to clipboard!');
            };

            return (
                <div className="container">
                    <div className="header">
                        <h1>S1 Posting Helper</h1>
                        <p>PSLE Secondary School Shortlisting Tool</p>
                    </div>

                    {/* Step 1: Input */}
                    <div className="section">
                        <div className="section-header">
                            <div className="step-number">1</div>
                            <div className="section-title">Enter Your Details</div>
                        </div>

                        <div className="input-grid">
                            <div className="input-group">
                                <label className="input-label">PSLE AL Score</label>
                                <input
                                    type="number"
                                    className="score-input"
                                    value={score}
                                    onChange={(e) => setScore(e.target.value)}
                                    min="4"
                                    max="36"
                                    placeholder="Enter score"
                                />
                                <span className="input-hint">Range 4 (best) – 36 (worst)</span>
                            </div>

                            <div className="input-group">
                                <label className="input-label">Higher Chinese Level</label>
                                <div className="chip-group">
                                    {['none', 'pass', 'merit', 'distinction'].map(level => (
                                        <button
                                            key={level}
                                            className={`chip ${hclLevel === level ? 'active' : ''}`}
                                            onClick={() => setHclLevel(level)}
                                        >
                                            {level.charAt(0).toUpperCase() + level.slice(1)}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="input-group">
                                <label className="input-label">Posting Tracks</label>
                                <div className="chip-group">
                                    {['IP', 'PG3', 'PG2', 'PG1'].map(track => (
                                        <button
                                            key={track}
                                            className={`chip ${selectedTracks.includes(track) ? 'active' : ''}`}
                                            onClick={() => toggleTrack(track)}
                                        >
                                            {track}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Step 2: Filters */}
                    <div className="section">
                        <div className="section-header">
                            <div className="step-number">2</div>
                            <div className="section-title">Filter by Area</div>
                        </div>

                        {Object.entries(REGIONS).map(([region, areas]) => (
                            <div key={region} className="region-group">
                                <div className="region-header">
                                    <button
                                        className={`region-toggle ${isRegionActive(region) ? 'active' : ''}`}
                                        onClick={() => toggleRegion(region)}
                                    >
                                        {isRegionActive(region) ? '✓' : '○'} {region}
                                    </button>
                                    <span className="region-name">{region} Region</span>
                                </div>
                                <div className="area-chips">
                                    {areas.map(area => (
                                        <button
                                            key={area}
                                            className={`area-chip ${selectedAreas.includes(area) ? 'active' : ''}`}
                                            onClick={() => toggleArea(area)}
                                        >
                                            {selectedAreas.includes(area) ? '✓' : '○'} {area}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        ))}

                        <div className="filter-actions">
                            <button
                                className="filter-action-btn"
                                onClick={() => {
                                    const allAreas = Object.values(REGIONS).flat();
                                    setSelectedAreas(allAreas);
                                }}
                            >
                                Select all
                            </button>
                            <button
                                className="filter-action-btn"
                                onClick={() => setSelectedAreas([])}
                            >
                                Clear
                            </button>
                            <button
                                className="filter-action-btn"
                                onClick={() => setShowBufferOnly(!showBufferOnly)}
                            >
                                {showBufferOnly ? '✓ Safety buffer only' : 'Safety buffer only (+2)'}
                            </button>
                            <button
                                className="filter-action-btn"
                                onClick={() => setShowSAPOnly(!showSAPOnly)}
                            >
                                {showSAPOnly ? '✓ SAP schools only' : 'SAP schools only'}
                            </button>
                        </div>
                    </div>

                    {/* Step 3: Results */}
                    <div className="section">
                        <div className="section-header">
                            <div className="step-number">3</div>
                            <div className="section-title">Matching Schools</div>
                            {filteredSchools.length > 0 && (
                                <span className="section-count">— {filteredSchools.length} schools</span>
                            )}
                        </div>

                        {validScore && score !== '' && (
                            <>
                                <div className="sort-bar">
                                    <div className="sort-options">
                                        <button
                                            className={`sort-btn ${sortBy === 'safest' ? 'active' : ''}`}
                                            onClick={() => setSortBy('safest')}
                                        >
                                            Safest
                                        </button>
                                        <button
                                            className={`sort-btn ${sortBy === 'cutoff' ? 'active' : ''}`}
                                            onClick={() => setSortBy('cutoff')}
                                        >
                                            Cut-off
                                        </button>
                                        <button
                                            className={`sort-btn ${sortBy === 'name' ? 'active' : ''}`}
                                            onClick={() => setSortBy('name')}
                                        >
                                            Name
                                        </button>
                                    </div>
                                    <span className="results-count">{filteredSchools.length} results</span>
                                </div>

                                <table className="results-table">
                                    <thead>
                                        <tr>
                                            <th style={{ width: '30%' }}>School</th>
                                            <th style={{ width: '15%' }}>Area</th>
                                            <th style={{ width: '10%' }}>Track</th>
                                            <th style={{ width: '10%' }}>Cut-off</th>
                                            <th style={{ width: '15%' }}>Buffer</th>
                                            <th style={{ width: '15%' }}>Tags</th>
                                            <th style={{ width: '5%' }}></th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredSchools.map((result, idx) => (
                                            <tr key={`${result.school.name}-${result.track}`}>
                                                <td>
                                                    <div className="school-name">{result.school.name}</div>
                                                </td>
                                                <td>
                                                    <div className="school-area">{result.school.zone}</div>
                                                </td>
                                                <td>
                                                    <span className="track-badge">{result.track}</span>
                                                </td>
                                                <td>
                                                    <span className="cut-off-score">{result.cutOff}</span>
                                                </td>
                                                <td>
                                                    <span className={`buffer-pill ${
                                                        result.buffer >= 2 ? 'buffer-safe' :
                                                        result.buffer >= 0 ? 'buffer-borderline' : 'buffer-tight'
                                                    }`}>
                                                        {result.buffer >= 0 ? '+' : ''}{result.buffer}
                                                    </span>
                                                </td>
                                                <td>
                                                    <div className="tags-cell">
                                                        {result.isSAP && <span className="sap-badge">SAP</span>}
                                                        {result.isHCLLow && <span className="hcl-warning">HCL low</span>}
                                                        {result.isHCLRisky && !result.isHCLLow && <span className="hcl-warning">HCL risky</span>}
                                                    </div>
                                                </td>
                                                <td>
                                                    <button
                                                        className={`pick-btn ${picks.some(p => p.school.name === result.school.name && p.track === result.track) ? 'added' : ''}`}
                                                        onClick={() => addPick(result.school, result.track)}
                                                        disabled={picks.length >= 6 && !picks.some(p => p.school.name === result.school.name && p.track === result.track)}
                                                    >
                                                        {picks.some(p => p.school.name === result.school.name && p.track === result.track) ? '✓ Added' : 'Add'}
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>

                                <div className="buffer-explanation">
                                    <strong>Buffer explanation:</strong> Shows how many points above the cut-off your score is. 
                                    Green (+2 or more) = Safe | Orange (0 to +1) = Borderline | Red (negative) = Below cut-off
                                </div>
                            </>
                        )}

                        {(!validScore || score === '') && (
                            <p style={{ textAlign: 'center', color: '#888', padding: '40px' }}>
                                Enter a valid PSLE score (4-36) to see matching schools.
                            </p>
                        )}
                    </div>

                    {/* Step 4: Six Choices */}
                    <div className="section">
                        <div className="section-header">
                            <div className="step-number">4</div>
                            <div className="section-title">Your 6 Choices</div>
                            <span className="section-count">— {picks.length}/6 selected</span>
                        </div>

                        <div className="choices-grid">
                            {[0, 1, 2, 3, 4, 5].map(idx => {
                                const pick = picks[idx];
                                return (
                                    <div key={idx} className={`choice-row ${pick ? 'filled' : ''}`}>
                                        <div className="priority-num">{idx + 1}</div>
                                        {pick ? (
                                            <>
                                                <div className="choice-info">
                                                    <div className="choice-school">{pick.school.name}</div>
                                                    <div className="choice-details">
                                                        {pick.track} • Cut-off: {pick.school.tracks[pick.track]?.score} • 
                                                        Zone: {pick.school.zone}
                                                        {pick.school.tracks[pick.track]?.isSAP && hclLevel !== 'distinction' && (
                                                            <span style={{ marginLeft: '8px', color: '#856404' }}>⚠ HCL risky</span>
                                                        )}
                                                    </div>
                                                </div>
                                                <div className="choice-actions">
                                                    <button
                                                        className="move-btn"
                                                        onClick={() => movePick(idx, -1)}
                                                        disabled={idx === 0}
                                                    >
                                                        ↑
                                                    </button>
                                                    <button
                                                        className="move-btn"
                                                        onClick={() => movePick(idx, 1)}
                                                        disabled={idx === picks.length - 1}
                                                    >
                                                        ↓
                                                    </button>
                                                    <button
                                                        className="remove-btn"
                                                        onClick={() => removePick(idx)}
                                                    >
                                                        Remove
                                                    </button>
                                                </div>
                                            </>
                                        ) : (
                                            <div className="choice-info" style={{ color: '#888', fontStyle: 'italic' }}>
                                                Empty slot - select a school from the results above
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>

                        {picks.length > 0 && (
                            <div className="strategy-panel">
                                <div className="section-header" style={{ borderBottom: 'none', paddingBottom: '8px', marginBottom: '12px' }}>
                                    <div className="section-title" style={{ fontSize: '1.1rem' }}>Strategy Summary</div>
                                </div>

                                <div className="strategy-breakdown">
                                    <div className="strategy-item">
                                        <div className="strategy-value" style={{ color: '#dc3545' }}>{strategyBreakdown.overshoot}</div>
                                        <div className="strategy-label">Over cut-off</div>
                                        <div className="strategy-hint">−1 to −2 buffer</div>
                                    </div>
                                    <div className="strategy-item">
                                        <div className="strategy-value" style={{ color: '#fd7e14' }}>{strategyBreakdown.reach}</div>
                                        <div className="strategy-label">Reach</div>
                                        <div className="strategy-hint">0 or +1 buffer</div>
                                    </div>
                                    <div className="strategy-item">
                                        <div className="strategy-value" style={{ color: '#28a745' }}>{strategyBreakdown.safe}</div>
                                        <div className="strategy-label">Safe</div>
                                        <div className="strategy-hint">+2 buffer or more</div>
                                    </div>
                                </div>

                                <div className="areas-covered">
                                    <div className="areas-title">Areas covered:</div>
                                    <div className="areas-list">
                                        {strategyBreakdown.areas.length > 0 ? (
                                            strategyBreakdown.areas.map(area => (
                                                <span key={area} className="area-tag">{area}</span>
                                            ))
                                        ) : (
                                            <span style={{ color: '#888', fontStyle: 'italic' }}>none yet</span>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Step 5: Export */}
                    <div className="section">
                        <div className="section-header">
                            <div className="step-number">5</div>
                            <div className="section-title">Export Choices</div>
                        </div>

                        <div className="export-section">
                            <div className="export-preview">{exportText}</div>
                            <button className="export-btn" onClick={copyToClipboard}>
                                Copy to Clipboard
                            </button>
                        </div>
                    </div>

                    <div className="footer">
                        <p><strong>Disclaimer:</strong> This tool is for reference only. Cut-off scores are based on previous years' data and may vary. 
                        Please verify with MOE's official sources before making final decisions.</p>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
